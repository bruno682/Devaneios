<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Eid</title>
<script>
  window.bgColor = "#1B1B1B";
  document.documentElement.style.backgroundColor = window.bgColor;
  window.overlayColor = 'hsl(' + Math.floor(Math.random() * 360) + ', 70%, 55%)';
  document.documentElement.style.setProperty('--overlay-color', window.overlayColor);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    transition: background-color 0.3s ease;
  }

  .rosto {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    pointer-events: none;
    z-index: 10;
    opacity: 01;
  }

  .video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 11;
    background-color: var(--overlay-color, transparent);
    mix-blend-mode: multiply;
  }

  .frase {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .canto {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 30;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .continuar {
    position: relative;
    z-index: 5;
    margin-top: 20px;
    color: #a2a2a2;
    text-align: center;
    font-family: "Instrument sans";
    font-size: 20px;
    font-style: normal;
    font-weight: 400;
    text-decoration: none;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .linha {
    color: #ffffff;
    text-align: center;
    font-family: "Instrument Sans", sans-serif;
    font-size: 35px;
    font-style: normal;
    font-weight: 400;
    line-height: 66px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .page-transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #1b1b1b;
    clip-path: circle(0% at 50% 100%);
    pointer-events: none;
    transition: clip-path 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .page-transition-overlay.cobrir {
    clip-path: circle(150% at 50% 100%);
  }

  @media (max-width: 900px) {
    .linha { font-size: clamp(18px, 5vw, 35px); line-height: 1.4; }
    .continuar { font-size: clamp(13px, 3vw, 20px); }
  }
  @media (max-width: 500px) {
    .linha { font-size: clamp(16px, 5.5vw, 24px); line-height: 1.4; }
    .continuar { font-size: 13px; }
  }

</style>

<script src="cursor.js" defer></script>
<script src="transitions.js" defer></script>
</head>
<body>
  <div class="page-transition-overlay" id="page-transition"></div>
  <script>
  (function() {
    var overlay = document.getElementById('page-transition');
    if (!overlay) return;

    if (sessionStorage.getItem('pageTransition') === '1') {
      sessionStorage.removeItem('pageTransition');
      overlay.style.transition = 'none';
      overlay.classList.add('cobrir');
      overlay.offsetHeight;
      overlay.style.transition = '';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          overlay.classList.remove('cobrir');
        });
      });
    }

    window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a.canto, a.page-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var url = link.getAttribute('href');
          sessionStorage.setItem('pageTransition', '1');
          overlay.classList.add('cobrir');
          setTimeout(function() { window.location.href = url; }, 900);
        });
      });
    });
  })();
  </script>
  <video class="rosto" src="rostog3.mp4" autoplay muted loop playsinline></video>
  <div class="video-overlay"></div>

  <a href="devaneios-index.html" class="canto" style="display: block;">
    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
      <circle cx="22.5" cy="37.5" r="22.5" fill="#ffffff"/>
      <circle cx="37.5" cy="22.5" r="22.5" fill="#ffffff"/>
      <rect id="canto-rect" x="25" y="25" width="10" height="10" fill="#FFED85"/>
    </svg>
  </a>

  <div class="frase">
    <div id="linha1" class="linha">Se o mundo esta sempre mudando.</div>
    <div id="linha2" class="linha">Como você consegue ficar parado?</div>
    <a id="continuar" href="home.html" class="continuar page-link">clique para continuar</a>
  </div>

  <div id="loading-screen" style="
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  ">
    <svg width="100" height="100" viewBox="0 0 120 120">
      <circle id="loading-ball-a" cx="30" cy="60" r="12" fill="#1b1b1b"/>
      <circle id="loading-ball-b" cx="90" cy="60" r="12" fill="#1b1b1b"/>
    </svg>
  </div>

<script>
(function() {
  var a = document.getElementById('loading-ball-a');
  var b = document.getElementById('loading-ball-b');
  if (!a || !b) return;

  var cx = 60, cy = 60;
  var t0 = performance.now();
  var dur = 1800;
  var maxRadius = 28;
  var running = true;

  // raio: 0 -> maxRadius -> 0 ao longo do ciclo (sobe e desce suave)
  function radiusEase(phase) {
    // seno suave: 0 no inicio, pico a meio, 0 no fim
    return Math.sin(phase * Math.PI);
  }

  function frame(now) {
    if (!running) return;

    var elapsed = (now - t0) % dur;
    var phase = elapsed / dur;

    var radius = maxRadius * radiusEase(phase);
    // angulo avanca 360 graus (2*PI) ao longo de todo o ciclo
    var angle = phase * Math.PI * 2;

    var ax = cx + radius * Math.cos(angle);
    var ay = cy + radius * Math.sin(angle);
    var bx = cx + radius * Math.cos(angle + Math.PI);
    var by = cy + radius * Math.sin(angle + Math.PI);

    a.setAttribute('cx', ax);
    a.setAttribute('cy', ay);
    b.setAttribute('cx', bx);
    b.setAttribute('cy', by);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  window.hideLoading = function() {
    if (!running) return;
    running = false;
    var screen = document.getElementById('loading-screen');
    if (!screen) return;
    screen.style.opacity = '0';
    setTimeout(function() { screen.remove(); }, 600);
  };

  var video = document.querySelector('.rosto');
  if (video) {
    if (video.readyState >= 3) {
      window.hideLoading();
    } else {
      video.addEventListener('canplaythrough', window.hideLoading, { once: true });
    }
  }

  var cantoRect = document.getElementById('canto-rect');
  if (cantoRect && window.bgColor) cantoRect.setAttribute('fill', window.bgColor);

  var linha1 = document.getElementById('linha1');
  var linha2 = document.getElementById('linha2');
  var canto = document.querySelector('.canto');
  var continuar = document.getElementById('continuar');
  setTimeout(function() { if (linha1) linha1.style.opacity = '1'; }, 1500);
  setTimeout(function() { if (linha2) linha2.style.opacity = '1'; }, 3000);
  setTimeout(function() {
    if (canto) canto.style.opacity = '1';
    if (continuar) continuar.style.opacity = '1';
  }, 4500);

  var frase = document.querySelector('.frase');
  if (frase) {
    frase.addEventListener('click', function(e) {
      if (e.target.closest('a')) return;
      var overlay = document.getElementById('page-transition');
      if (!overlay) { window.location.href = 'home.html'; return; }
      sessionStorage.setItem('pageTransition', '1');
      overlay.classList.add('cobrir');
      setTimeout(function() { window.location.href = 'home.html'; }, 900);
    });
  }
})();
</script>
</body>
</html>
