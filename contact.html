<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Eid</title>
<script>
  document.documentElement.style.backgroundColor = '#ffffff';
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: #ffffff;
    font-family: "Instrument Sans", sans-serif;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 30;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px;
  }

  .titulo {
    text-align: center;
  }

  .titulo h1 {
    margin: 0;
    color: #1B1B1B;
    font-family: "Instrument Sans", sans-serif;
    font-size: 37px;
    font-weight: 700;
    line-height: normal;
  }

  .titulo h1 a {
    color: inherit;
    text-decoration: none;
  }

  .titulo p {
    margin: 0;
    color: #9F9F9F;
    font-family: "Instrument Sans", sans-serif;
    font-size: 14px;
    font-weight: 600;
    line-height: normal;
    text-transform: uppercase;
  }

  /* ── CONTEÚDO ── */
  .conteudo {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .conteudo h2 {
    margin: 0;
    color: #1B1B1B;
    text-align: center;
    font-family: "Instrument Sans", sans-serif;
    font-size: 47px;
    font-style: normal;
    font-weight: 700;
    line-height: normal;
  }

  .links {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .links a {
    color: #1B1B1B;
    text-align: center;
    font-family: "Instrument Sans", sans-serif;
    font-size: 19px;
    font-style: normal;
    font-weight: 400;
    line-height: normal;
    text-decoration: none;
  }

  .links span {
    color: #D1D1D1;
    font-size: 19px;
  }

  /* ── TRANSIÇÃO ── */
  .page-transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #1b1b1b;
    clip-path: circle(0% at 50% 100%);
    pointer-events: none;
    transition: clip-path 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .page-transition-overlay.cobrir {
    clip-path: circle(150% at 50% 100%);
  }

  @media (max-width: 900px) {
    .titulo h1 { font-size: clamp(18px, 3vw, 37px); }
    .conteudo h2 { font-size: clamp(28px, 6vw, 47px); }
    .conteudo svg { width: min(479px, 80vw); }
  }
  @media (max-width: 500px) {
    .links { flex-direction: column; align-items: center; gap: 6px; }
    .links span { display: none; }
    .titulo h1 { font-size: 20px; }
  }
</style>

<script src="cursor.js" defer></script>
<script src="transitions.js" defer></script>
</head>
<body>
  <div class="page-transition-overlay" id="page-transition"></div>
  <script>
  (function() {
    var overlay = document.getElementById('page-transition');
    if (!overlay) return;
    if (sessionStorage.getItem('pageTransition') === '1') {
      sessionStorage.removeItem('pageTransition');
      overlay.style.transition = 'none';
      overlay.classList.add('cobrir');
      overlay.offsetHeight;
      overlay.style.transition = '';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { overlay.classList.remove('cobrir'); });
      });
    }
    window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a.page-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var url = link.getAttribute('href');
          sessionStorage.setItem('pageTransition', '1');
          overlay.classList.add('cobrir');
          setTimeout(function() { window.location.href = url; }, 900);
        });
      });
    });
  })();
  </script>

  <header class="header">
    <!-- Botão voltar -->
    <a href="home.html" class="page-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 45 45" fill="none">
        <circle cx="22.5" cy="22.5" r="22.5" fill="#1B1B1B"/>
        <path d="M23.2788 13H29L20.7212 23L29 33H23.2788L15 23L23.2788 13Z" fill="white"/>
      </svg>
    </a>

    <!-- Título central -->
    <div class="titulo">
      <h1><a href="index.html" class="page-link">BRUNO EID</a></h1>
      <p>Contactos</p>
    </div>

    <!-- Botão direito (página preta) -->
    <a href="devaneios-contact.html" class="page-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
        <circle cx="22.5" cy="37.5" r="22.5" fill="#1B1B1B"/>
        <circle cx="37.5" cy="22.5" r="22.5" fill="#1B1B1B"/>
        <rect x="25" y="25" width="10" height="10" fill="white"/>
      </svg>
    </a>
  </header>

  <main class="conteudo">
    <h2>Entre em contacto.</h2>

    <svg xmlns="http://www.w3.org/2000/svg" width="479" height="1" viewBox="0 0 479 1" fill="none">
      <path d="M0 0.5H479" stroke="#D1D1D1"/>
    </svg>

    <div class="links">
      <a href="https://www.linkedin.com/in/brnno-alcantara/">linkedin</a>
      <span>·</span>
      <a href="https://www.instagram.com/brunoenricoea/?utm_source=ig_web_button_share_sheet">instagram</a>
      <span>·</span>
      <a href="mailto:bruenricoeid@hotmail.com">email</a>
    </div>
  </main>

</body>
</html>
