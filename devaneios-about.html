<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devaneio</title>
<script>
  document.documentElement.style.backgroundColor = '#1b1b1b';
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400&family=Instrument+Serif:wght@400&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Instrument sans";
    background-color: #1b1b1b;
    overflow: hidden;
  }

  .grade {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    opacity: 0.15;
    pointer-events: none;
  }

  .fundo-cena {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: grid;
    grid-template-columns: 1.7fr 1fr 0.8fr;
    align-items: center;
    padding: 100px 60px 40px 100px;
    gap: 40px;
    opacity: 0.15;
    filter: grayscale(100%);
    pointer-events: none;
  }

  .col-foto {
    height: 100%;
    display: flex;
    align-items: center;
  }

  #facets-img {
    width: 100%;
    max-height: calc(100vh - 140px);
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .col-ano {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ano {
    color: #a2a2a2;
    font-family: "Instrument Serif", serif;
    font-size: 81px;
    font-style: normal;
    font-weight: 400;
    line-height: normal;
    text-align: center;
  }

  .col-texto {
    display: flex;
    align-items: center;
  }

  .descricao {
    color: #a2a2a2;
    font-family: "Instrument Sans", sans-serif;
    font-size: 15px;
    font-style: normal;
    font-weight: 400;
    line-height: 20px;
    margin: 0;
  }

  .canto {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 30;
    display: block;
  }

  .texto {
    position: relative;
    z-index: 5;
    color: #a2a2a2;
    text-align: center;
    max-width: 780px;
    padding: 0 24px;
    font-family: "Instrument Serif", serif;
    font-size: 36px;
    font-style: normal;
    font-weight: 400;
    line-height: 60px;
  }

  .continuar {
    position: relative;
    z-index: 5;
    margin-top: 20px;
    color: #a2a2a2;
    text-align: center;
    font-family: "Instrument sans";
    font-size: 20px;
    font-style: normal;
    font-weight: 400;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .page-transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #1b1b1b;
    clip-path: circle(0% at 50% 100%);
    pointer-events: none;
    transition: clip-path 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .page-transition-overlay.cobrir {
    clip-path: circle(150% at 50% 100%);
  }

  .creditos {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    max-width: 260px;
    color: #a2a2a2;
    text-align: right;
    font-family: "Instrument Sans", sans-serif;
    font-size: 12px;
    font-weight: 400;
    line-height: 16px;
    opacity: 0.5;
  }

  .creditos a {
    color: #a2a2a2;
    text-decoration: underline;
  }
</style>

<script src="cursor.js" defer></script>
</head>
<body>
  <div class="page-transition-overlay" id="page-transition"></div>
  <script>
  (function() {
    var overlay = document.getElementById('page-transition');
    if (!overlay) return;

    if (sessionStorage.getItem('pageTransition') === '1') {
      sessionStorage.removeItem('pageTransition');
      overlay.style.transition = 'none';
      overlay.classList.add('cobrir');
      overlay.offsetHeight;
      overlay.style.transition = '';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          overlay.classList.remove('cobrir');
        });
      });
    }

    window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a.canto').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var url = link.getAttribute('href');
          sessionStorage.setItem('pageTransition', '1');
          overlay.classList.add('cobrir');
          setTimeout(function() { window.location.href = url; }, 900);
        });
      });
    });
  })();
  </script>

  <svg class="grade" xmlns="http://www.w3.org/2000/svg" width="842" height="532" viewBox="0 0 842 532" fill="none">
    <<path d="M1 0V540.857M841 0V540.857M211 1.74121V29.5M211 542.598V390M631 0V540.857M421 1.74121V542.598" stroke="url(#paint0_linear_112_227)" stroke-width="2"/>
<defs>
<linearGradient id="paint0_linear_112_227" x1="454.75" y1="0" x2="454.75" y2="540.857" gradientUnits="userSpaceOnUse">
<stop stop-color="#1B1B1B"/>
<stop offset="1" stop-color="#2D2D2D"/>
</linearGradient>
</defs>
</svg>

  <div class="fundo-cena">
    <div class="col-foto">
      <img id="facets-img" src="facets/about1.png" alt="">
    </div>
    <div class="col-ano">
      <span class="ano" id="ano-texto">2005</span>
    </div>
    <div class="col-texto">
      <p class="descricao" id="descricao-texto">Nasci em uma cidade<br>pequena no Brasil</p>
    </div>
  </div>

  <p class="creditos">Fotos feitas para o portfólio <br> na cadeira de projeto na UA.</p>

  <a href="about.html" class="canto">
    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 45 45" fill="none">
      <circle cx="22.5" cy="22.5" r="22.5" fill="white"/>
      <path d="M23.2788 13H29L20.7212 23L29 33H23.2788L15 23L23.2788 13Z" fill="#1B1B1B"/>
    </svg>
  </a>

  <div id="area-central" style="display: flex; flex-direction: column; align-items: center; cursor: pointer;">
    <p id="texto-principal" class="texto">
      Estamos em constante mudança, e<br>
      negar que as coisas não serão mais<br>
      as mesmas é o que traz angústia.
    </p>

    <p id="continuar" class="continuar">clique para continuar</p>
  </div>

<script>
  var images = [
    'about1.png','about2.png','about3.png',
    'about4.png','about5.png','about6.png','about7.png',
    'about8.png','about9.png','about10.png','about11.png',
    'about12.png','about13.png','about14.png','about15.png',
    'about16.png'
  ];
  var idx = 0;
  var img = document.getElementById('facets-img');
  setInterval(function() {
    idx = (idx + 1) % images.length;
    img.src = 'facets/' + images[idx];
  }, 1000);

  var chapters = [
    { year: '2005', text: 'Nasci em uma cidade<br>pequena no Brasil' },
    { year: '2016', text: 'Mudei de escola para<br>uma cidade maior' },
    { year: '2020', text: 'Descobri meu interesse<br>em desenho' },
    { year: '2022', text: 'Decidi ser designer' },
    { year: '2023', text: 'Fui para Portugal<br>estudar design' },
    { year: '2025', text: 'Fui para Barcelona e conheci<br>o designer de interação' }
  ];
  var chapterIdx = 0;
  var anoEl = document.getElementById('ano-texto');
  var descEl = document.getElementById('descricao-texto');
  setInterval(function() {
    chapterIdx = (chapterIdx + 1) % chapters.length;
    anoEl.innerHTML = chapters[chapterIdx].year;
    descEl.innerHTML = chapters[chapterIdx].text;
  }, 2200);

  setTimeout(function() {
    var continuar = document.getElementById('continuar');
    if (continuar) continuar.style.opacity = '1';
  }, 2000);

  document.getElementById('area-central').addEventListener('click', function() {
    var textoPrincipal = document.getElementById('texto-principal');
    var continuar = document.getElementById('continuar');
    if (textoPrincipal) {
      textoPrincipal.innerHTML = 'Olho para este about não como<br>quem olha num espelho, mas como<br>quem olha uma fotografia.';
    }
    if (continuar) {
      continuar.style.opacity = '0';
    }
  });
</script>
</body>
</html>
